<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Intelligence Hub — Chartis</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A2240;--navy-light:#132E4F;--navy-mid:#1A3A5C;--teal:#2E7D9B;--teal-light:#3A9BC2;--teal-soft:#E3F2F8;--coral:#E87722;--coral-soft:#FFF0E5;--bg:#F7F9FB;--card:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text-sec:#475569;--text-muted:#94A3B8;--text-on-dark:#E2E8F0;--text-on-dark-muted:#8BA3BF;--green:#16A34A;--green-soft:#DCFCE7;--amber:#D97706;--amber-soft:#FEF3C7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:260px;height:100vh;background:linear-gradient(180deg,var(--navy),var(--navy-light));color:var(--text-on-dark);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:10}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--navy-mid);display:flex;align-items:center;gap:10px;cursor:pointer}
.sidebar-logo:hover{opacity:.9}
.chartis-wordmark{font-family:'Source Sans 3',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;color:#fff;text-transform:uppercase}
.chartis-sub{font-size:9px;color:var(--text-on-dark-muted);letter-spacing:.1em;margin-top:1px;font-weight:600}
.sidebar-section{padding:20px 20px 8px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text-on-dark-muted);margin-bottom:12px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:2px;border-radius:8px;transition:all .2s;cursor:pointer;font-size:13px;color:var(--text-on-dark-muted)}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(46,125,155,.15);color:#fff;font-weight:600}
.nav-item .nav-badge{margin-left:auto;font-size:10px;background:var(--coral);color:#fff;padding:1px 6px;border-radius:4px;font-weight:600}
.sidebar-divider{height:1px;background:var(--navy-mid);margin:12px 20px}
.sidebar-quicklinks{padding:8px 20px;flex:1;overflow-y:auto}
.quicklink-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text-on-dark-muted);margin-bottom:10px;text-transform:uppercase}
.quicklink-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:2px;border-radius:6px;font-size:12px;color:var(--text-on-dark-muted);cursor:pointer;transition:all .2s}
.quicklink-item:hover{background:rgba(255,255,255,.06);color:var(--teal-light)}
.quicklink-item .ql-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.quicklink-new{display:flex;align-items:center;gap:8px;padding:9px 12px;margin:8px 20px 0;border-radius:8px;background:rgba(46,125,155,.12);color:var(--teal-light);font-size:13px;font-weight:600;cursor:pointer;border:1px dashed rgba(46,125,155,.3);transition:all .2s}
.quicklink-new:hover{background:rgba(46,125,155,.2)}

/* Wizard stepper in sidebar */
.step-item{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:4px;border-radius:8px;transition:all .2s;cursor:default}
.step-item.clickable{cursor:pointer}.step-item.clickable:hover{background:rgba(46,125,155,.08)}
.step-item.active{background:rgba(46,125,155,.15)}
.step-circle{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:all .3s;background:rgba(255,255,255,.08);color:var(--text-on-dark-muted)}
.step-circle.active{background:rgba(46,125,155,.3);color:#fff}
.step-circle.complete{background:var(--teal);color:#fff}
.step-label{font-size:13px;font-weight:400;color:var(--text-on-dark-muted)}
.step-item.active .step-label{font-weight:600;color:#fff}
.step-item.complete .step-label{color:var(--teal-light)}
.context-panel{margin-top:16px;padding:14px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.ctx-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text-on-dark-muted);margin-bottom:10px;text-transform:uppercase}
.ctx-row{font-size:12px;color:var(--text-on-dark-muted);margin-bottom:6px}.ctx-row span{color:var(--teal-light)}

.sidebar-user{padding:16px 20px;border-top:1px solid var(--navy-mid)}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--coral));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.user-name{font-size:13px;font-weight:600;color:#fff}
.role-select{width:100%;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text-on-dark);font-size:12px;font-family:inherit;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238BA3BF' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.role-select option{background:var(--navy);color:#fff}

.main-wrapper{flex:1;margin-left:260px;height:100vh;display:flex;flex-direction:column}
.top-header{height:48px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0}
.top-header-breadcrumb{font-size:13px;color:var(--text-muted)}
.top-header-breadcrumb strong{color:var(--navy);font-weight:600}
.top-header-right{display:flex;align-items:center;gap:12px}
.header-icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s}
.header-icon-btn:hover{background:#F0F4F7;color:var(--navy)}
.main-body{flex:1;display:flex;overflow:hidden}
.main-scroll{flex:1;overflow-y:auto}
.content{max-width:920px;margin:0 auto;padding:36px 40px 80px}
.content-narrow{max-width:740px;margin:0 auto;padding:36px 40px 80px}
.bottom-footer{height:36px;border-top:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;padding:0 32px;flex-shrink:0;font-size:11px;color:var(--text-muted)}

@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tooltipIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.anim{animation:fadeInUp .5s ease-out both}
.anim-1{animation-delay:80ms}.anim-2{animation-delay:160ms}.anim-3{animation-delay:240ms}.anim-4{animation-delay:320ms}.anim-5{animation-delay:400ms}

.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-teal{color:var(--teal);background:var(--teal-soft)}.badge-coral{color:var(--coral);background:var(--coral-soft)}
.badge-navy{color:var(--navy);background:#E8EDF2}.badge-green{color:var(--green);background:var(--green-soft)}
.badge-amber{color:var(--amber);background:var(--amber-soft)}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:24px;transition:all .25s ease;box-shadow:0 1px 3px rgba(10,34,64,.04)}
.card-hover:hover{border-color:var(--teal);box-shadow:0 4px 20px rgba(46,125,155,.12);transform:translateY(-2px)}.card-hover{cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .25s ease;font-family:inherit}
.btn:hover:not(:disabled){transform:translateY(-1px)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff;box-shadow:0 2px 12px rgba(46,125,155,.25)}
.btn-secondary{background:var(--teal-soft);color:var(--teal)}.btn-ghost{background:transparent;color:var(--teal)}
.btn-coral{background:linear-gradient(135deg,var(--coral),#F59042);color:#fff;box-shadow:0 2px 12px rgba(232,119,34,.25)}
.btn-sm{padding:8px 16px;font-size:13px}
.back-link{background:none;border:none;color:var(--teal);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:24px;padding:0;font-family:inherit}
.section-label{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
textarea{width:100%;padding:16px;border-radius:10px;border:1px solid var(--border);font-size:14px;line-height:1.6;color:var(--text);resize:vertical;outline:none;font-family:inherit;transition:border-color .2s}
textarea:focus{border-color:var(--teal)}textarea::placeholder{color:var(--text-muted)}
.select-grid{display:grid;gap:12px}.select-grid-2{grid-template-columns:repeat(2,1fr)}
.select-item{padding:16px 18px;border-radius:10px;border:2px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s ease;font-size:14px;font-weight:500;color:var(--text-sec)}
.select-item.selected{border-color:var(--teal);background:var(--teal-soft);font-weight:600;color:var(--navy)}
.select-item-sm{padding:14px 16px;font-size:13px}
.choice-btn{padding:8px 16px;border-radius:8px;border:2px solid var(--border);background:#fff;color:var(--text-sec);font-size:13px;font-weight:400;cursor:pointer;transition:all .2s;font-family:inherit}
.choice-btn.selected{border-color:var(--teal);background:var(--teal-soft);color:var(--navy);font-weight:600}
.exemplar-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:#FAFBFC}
.case-card{padding:16px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:#FAFBFC}
.phase-card{flex:1;padding:14px;border-radius:10px;background:#F8FAFC;border:1px solid var(--border)}
.deliverable-row{display:flex;align-items:center;padding:12px 14px;border-radius:8px;background:#F8FAFC;border:1px solid var(--border);margin-bottom:6px;gap:12px}
.sharepoint-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--teal);font-weight:500;cursor:pointer;padding:4px 10px;border-radius:6px;background:rgba(46,125,155,.1);text-decoration:none}
.view-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--teal);font-weight:500;cursor:pointer;white-space:nowrap;text-decoration:none}
.spinner{animation:spin 1s linear infinite}
.icon{display:inline-flex;align-items:center;flex-shrink:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.conf-wrapper{position:relative;display:inline-flex;align-items:center;cursor:help}
.conf-tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 14px;border-radius:8px;font-size:11px;line-height:1.5;width:220px;z-index:50;box-shadow:0 4px 12px rgba(10,34,64,.2);text-align:left;font-weight:400;pointer-events:none}
.conf-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--navy)}
.conf-wrapper:hover .conf-tip{display:block}

.chat-pane{width:380px;height:100%;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px}
.chat-msg{margin-bottom:14px;display:flex;gap:10px}
.chat-msg-ai .chat-bubble{background:var(--teal-soft);border-radius:12px 12px 12px 2px;padding:11px 15px;font-size:13px;line-height:1.6;color:var(--text);max-width:310px}
.chat-msg-user{justify-content:flex-end}
.chat-msg-user .chat-bubble{background:var(--navy);color:#fff;border-radius:12px 12px 2px 12px;padding:11px 15px;font-size:13px;line-height:1.6;max-width:310px}
.chat-msg-system{justify-content:center}
.chat-msg-system .chat-bubble{background:#F0F4F7;color:var(--text-muted);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:500;max-width:280px;text-align:center;border:1px dashed var(--border)}
.chat-msg-avatar{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-input-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.5}
.chat-input:focus{border-color:var(--teal)}
.chat-disabled-hint{padding:10px 16px;text-align:center;font-size:12px;color:var(--text-muted);background:#F8FAFC;border-top:1px solid var(--border);line-height:1.5}
.chat-tooltip{background:var(--navy);color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.5;margin:12px 20px;animation:tooltipIn .4s ease-out both;position:relative;box-shadow:0 4px 12px rgba(10,34,64,.15)}
.chat-tooltip::before{content:'';position:absolute;top:-6px;left:20px;width:12px;height:12px;background:var(--navy);transform:rotate(45deg);border-radius:2px}
.chat-tooltip-close{position:absolute;top:6px;right:8px;background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;line-height:1}
.chat-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(46,125,155,.35);display:flex;align-items:center;justify-content:center;z-index:50;transition:all .25s}
.chat-fab:hover{transform:scale(1.08)}.chat-fab .dot{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:var(--coral);border:2px solid #fff}

.timeline-compare{display:flex;align-items:center;gap:16px;margin-top:12px;padding:14px 16px;border-radius:10px;background:linear-gradient(135deg,var(--green-soft),#F0FDF4);border:1px solid rgba(22,163,74,.15)}
.timeline-bar{flex:1;height:8px;border-radius:4px;background:#E8EDF2;overflow:hidden}
.timeline-bar-fill{height:100%;border-radius:4px;transition:width .6s ease-out}
.savings-badge{background:var(--green);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap}

.preview-overlay{position:fixed;inset:0;background:rgba(10,34,64,.25);z-index:150;animation:fadeIn .2s ease-out}
.preview-panel{position:fixed;right:0;top:0;bottom:0;width:600px;background:var(--card);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(10,34,64,.12);z-index:200;display:flex;flex-direction:column;animation:slideIn .3s ease-out}
.preview-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.preview-body{flex:1;overflow-y:auto;padding:32px 36px}
.preview-doc{max-width:540px;margin:0 auto}
.preview-doc h1{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:6px;letter-spacing:-.01em;line-height:1.3}
.preview-doc .doc-meta{font-size:12px;color:var(--text-muted);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);line-height:1.5}
.preview-doc h2{font-size:15px;font-weight:700;color:var(--navy);margin:24px 0 10px;padding-top:16px;border-top:1px solid var(--border)}
.preview-doc h2:first-of-type{border-top:none;padding-top:0}
.preview-doc p{font-size:14px;line-height:1.7;color:var(--text-sec);margin-bottom:12px}
.preview-doc ul{margin:8px 0 16px 20px;font-size:14px;line-height:1.7;color:var(--text-sec)}
.preview-doc li{margin-bottom:4px}
.preview-doc .ai-flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-soft);padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.preview-doc .source-tag{font-size:11px;color:var(--text-muted);font-style:italic}
.preview-doc .confidence-bar{height:4px;border-radius:2px;background:#E8EDF2;margin:6px 0 12px;overflow:hidden}
.preview-doc .confidence-fill{height:100%;border-radius:2px}
.preview-doc table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:13px}
.preview-doc th{text-align:left;padding:8px 12px;background:#F0F4F7;font-weight:600;color:var(--navy);border:1px solid var(--border)}
.preview-doc td{padding:8px 12px;border:1px solid var(--border);color:var(--text-sec)}

.modal-overlay{position:fixed;inset:0;background:rgba(10,34,64,.5);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease-out}
.modal-box{background:#fff;border-radius:16px;max-width:520px;width:90%;padding:40px;box-shadow:0 20px 60px rgba(10,34,64,.2);animation:modalIn .4s ease-out;text-align:center;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.proj-list{display:flex;flex-direction:column;gap:10px}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-toggle-btn{padding:6px 10px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.view-toggle-btn.active{background:var(--teal-soft);color:var(--teal)}
.view-toggle-btn:not(:last-child){border-right:1px solid var(--border)}
.list-row{display:flex;align-items:center;gap:14px;padding:16px 20px}
.list-row:hover{border-color:var(--teal)}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">
    <div class="top-header" id="top-header"></div>
    <div class="main-body">
      <div class="main-scroll" id="main-content"></div>
      <div id="chat-pane-container"></div>
    </div>
    <div class="bottom-footer" id="bottom-footer"></div>
  </div>
  <div id="fab-container"></div>
  <div id="preview-container"></div>
  <div id="modal-container"></div>
</div>
<script>
const I={
layers:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 12.5-8.58 3.91a2 2 0 0 1-1.66 0L2 12.5"/><path d="m22 17.5-8.58 3.91a2 2 0 0 1-1.66 0L2 17.5"/></svg>`,
check:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
target:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
activity:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>`,

  const inputEnabled=S.chatInputEnabled||S.projectsChatOpen;
  let ttip='';
  if(S.tooltipVisible&&S.screen==='strategy'&&S.chatInputEnabled){
    ttip=`<div class="chat-tooltip">💡 <strong>Ask me anything.</strong> Disagree with a methodology choice? Want to know why I picked a template? Just ask.<button class="chat-tooltip-close" onclick="S.tooltipVisible=false;render()">✕</button></div>`;
  }
  el.innerHTML=`<div class="chat-pane">
    <div class="chat-header"><div style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--teal),var(--teal-light));display:flex;align-items:center;justify-content:center;color:#fff">${ic('sparkles','#fff')}</div><div><div style="font-size:13px;font-weight:700;color:var(--navy)">AI Delivery Strategist</div><div style="font-size:10px;color:var(--green);font-weight:500">${inWiz?'Following along':'Online'}</div></div></div>${S.projectsChatOpen?`<button style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px" onclick="S.projectsChatOpen=false;render()">${ic('x','var(--text-muted)')}</button>`:inWiz?`<div style="font-size:10px;color:var(--text-muted);background:#F0F4F7;padding:3px 8px;border-radius:4px">Context synced</div>`:''}</div>
    <div class="chat-messages" id="chat-msgs">${S.chatMessages.map(m=>{
      if(m.from==='system')return`<div class="chat-msg chat-msg-system"><div class="chat-bubble">${m.text}</div></div>`;
      if(m.from==='ai')return`<div class="chat-msg chat-msg-ai"><div class="chat-msg-avatar" style="background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff">${ic('sparkles','#fff')}</div><div class="chat-bubble">${m.text}</div></div>`;
      return`<div class="chat-msg chat-msg-user"><div class="chat-bubble">${m.text}</div></div>`;
    }).join('')}${ttip}</div>
    ${inputEnabled?`<div class="chat-input-area"><textarea class="chat-input" id="chat-inp" rows="1" placeholder="${S.projectsChatOpen?'Ask about projects or the knowledge base...':'Ask about methodology, templates, or strategy...'}" onkeydown="chatKey(event)"></textarea><button class="chat-send" onclick="sendChat()">${ic('send','#fff')}</button></div>`:`<div class="chat-disabled-hint">${ic('sparkles','var(--teal)')} Chat activates once your delivery strategy is ready.</div>`}
  </div>`;
  setTimeout(()=>{const m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight},50);
}
function renderFab(){
  const el=document.getElementById('fab-container');
  const inWiz=S.screen==='setup'||S.screen==='strategy'||S.screen==='generate';
  if(!inWiz&&!S.projectsChatOpen){
    el.innerHTML=`<button class="chat-fab" onclick="S.projectsChatOpen=true;render()"><span class="dot"></span>${ic('msgSq','#fff')}</button>`;
  }else{el.innerHTML=''}
}
function renderPreview(){
  const el=document.getElementById('preview-container');
  if(!S.previewOpen||!S.previewDoc){el.innerHTML='';return}
  el.innerHTML=`<div class="preview-overlay" onclick="closePreview()"></div><div class="preview-panel"><div class="preview-header"><div style="display:flex;align-items:center;gap:10px"><span style="color:var(--teal)">${ic('fileText','var(--teal)')}</span><div><div style="font-size:14px;font-weight:700;color:var(--navy)">Document Preview</div><div style="font-size:11px;color:var(--text-muted)">Read-only · Phase 0</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="badge badge-teal">AI-Generated</span><button style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px" onclick="closePreview()">${ic('x','var(--text-muted)')}</button></div></div><div class="preview-body"><div class="preview-doc">${DP[S.previewDoc]||'<p>Preview not available.</p>'}</div></div></div>`;
}
function renderModal(){
  const el=document.getElementById('modal-container');
  if(!S.showModal){el.innerHTML='';return}
  el.innerHTML=`<div class="modal-overlay"><div class="modal-box">
    <button class="modal-close" onclick="S.showModal=false;render()">${ic('x','var(--text-muted)')}</button>
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:12px">${chartisLogo.replace(/width="28"/g,'width="56"').replace(/height="28"/g,'height="56"')}<span style="font-family:'Source Sans 3',sans-serif;font-size:28px;font-weight:800;letter-spacing:.06em;color:var(--navy);text-transform:uppercase">CHARTIS</span></div>
    <h2 style="font-size:24px;font-weight:800;color:var(--navy);margin-bottom:8px">Welcome to the Delivery Intelligence Hub</h2>
    <p style="font-size:15px;color:var(--text-sec);line-height:1.6;margin-bottom:20px">Your AI-powered delivery strategist for creating Phase 0 deliverables — faster, with institutional knowledge built in.</p>
    <div style="text-align:left;background:#F8FAFC;border-radius:10px;padding:20px;margin-bottom:24px">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px"><span style="color:var(--teal);margin-top:2px">${ic('sparkles','var(--teal)')}</span><div><strong style="color:var(--navy);font-size:13px">AI-Guided Strategy</strong><p style="font-size:12px;color:var(--text-sec);margin-top:2px">Methodology recommendations, gold-standard templates, and case studies — all from the Chartis knowledge base.</p></div></div>
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px"><span style="color:var(--teal);margin-top:2px">${ic('clock','var(--teal)')}</span><div><strong style="color:var(--navy);font-size:13px">~20% Faster Delivery</strong><p style="font-size:12px;color:var(--text-sec);margin-top:2px">Phase 0 deliverables with substantive first-draft content. Review and refine instead of starting from scratch.</p></div></div>
      <div style="display:flex;align-items:flex-start;gap:10px"><span style="color:var(--teal);margin-top:2px">${ic('shield','var(--teal)')}</span><div><strong style="color:var(--navy);font-size:13px">Human-in-the-Loop</strong><p style="font-size:12px;color:var(--text-sec);margin-top:2px">Source attribution and confidence scores on every output. You control what goes to clients.</p></div></div>
    </div>
    <button class="btn btn-primary" onclick="S.showModal=false;render()" style="width:100%;justify-content:center">Get Started</button>
  </div></div>`;
}

// Actions
function nav(s){S.screen=s;if(s==='projects'){S.projectsChatOpen=false;S.viewingProject=null}render();const ms=document.querySelector('.main-scroll');if(ms)ms.scrollTop=0}
function startNew(){S.practiceArea=null;S.engagementType=null;S.description='';S.refinementAnswers={};S.showRefined=false;S.generating=false;S.generated=false;S.exportedItems={};S.chatInputEnabled=false;S.tooltipVisible=true;S.viewingProject=null;syncSetup();S.screen='setup';render()}
function cancelNew(){S.screen='projects';S.chatMessages=[{from:'ai',text:"Hi Pradeep! Ask me about your projects, the knowledge base, or start a new engagement."}];S.chatInputEnabled=true;render()}
function selPA(n){S.practiceArea=n;S.engagementType=null;syncPA();render()}
function selEng(t){S.engagementType=t;syncEng();render()}
function goStrategy(){S.screen='strategy';syncStrat();render();const ms=document.querySelector('.main-scroll');if(ms)ms.scrollTop=0}
function setRef(i,v){S.refinementAnswers[i]=v;addSys('Answered: '+v);render()}
function setRefT(i,v){S.refinementAnswers[i]=v}
function applyRef(){S.showRefined=true;syncRefine();render()}
function startGen(){S.generating=true;render();setTimeout(()=>{S.generating=false;S.generated=true;S.screen='generate';syncGen();render();const ms=document.querySelector('.main-scroll');if(ms)ms.scrollTop=0},2800)}
function exportIt(i){S.exportedItems[i]=true;render()}
function viewProject(id){S.viewingProject=id;S.screen='generate';render();const ms=document.querySelector('.main-scroll');if(ms)ms.scrollTop=0}
function openPreview(k){S.previewDoc=k;S.previewOpen=true;renderPreview()}
function closePreview(){S.previewOpen=false;S.previewDoc=null;renderPreview()}

const aiR=["Based on Chartis' experience, I'd recommend starting stakeholder interviews with C-suite sponsors first. Want me to pull an interview guide?","For Care Delivery engagements, highest-impact quick wins come from discharge process standardization. The Mercy Health exemplar has a great timeline for this.","I selected this methodology because it's been used on 23 comparable engagements with 91% satisfaction. The alternative — Operational Excellence Framework — is better for cost-focused work. Want me to swap?","The Chartis Clinical Performance Database has benchmarks for 142 comparable systems. Which gap areas matter most to your client's board?","Good concern. I can front-load ambulatory access analysis for quicker wins. Should I restructure the phasing?"];
let aIdx=0;
function sendChat(){const inp=document.getElementById('chat-inp'),txt=inp?inp.value.trim():'';if(!txt)return;addChat('user',txt);render();setTimeout(()=>{addChat('ai',aiR[aIdx%aiR.length]);aIdx++;render()},1200)}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}

render();
</script>
</body>
</html>
